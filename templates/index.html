<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safety Device Alert</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/leaflet.js"></script>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            color: white;
            transition: background 0.5s ease;
            overflow: hidden;
            min-width: 1024px;
        }
        #container {
            width: 90%;
            max-width: 1400px;
            background: white;
            padding: 20px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            text-align: center;
            color: #333;
            position: relative;
        }
        #map {
            height: 650px;
            width: 100%;
            margin-top: 20px;
            border-radius: 8px;
        }
        .button-container {
            display: flex;
            justify-content: flex-start;
            gap: 15px;
            margin: 10px 0;
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
        }
        button {
            padding: 14px 24px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0px 3px 8px rgba(0, 0, 0, 0.2);
        }
        .alert-button {
            background: #ff4b2b;
            color: white;
        }
        .alert-button:hover {
            background: #ff1e56;
            transform: scale(1.05);
        }
        .theme-button {
            background: #4b7bff;
            color: white;
        }
        .theme-button:hover {
            background: #2b57ff;
        }
        .dark-mode {
            background: linear-gradient(135deg, #1e1e1e, #444) !important;
            color: white;
        }
        .instructions {
            margin-top: 20px;
            text-align: left;
        }
        .instruction {
            margin-bottom: 20px;
            font-size: 16px;
        }
        .instruction img {
            width: 100px;
            display: block;
            margin: 10px auto;
        }
        @media (max-width: 1440px) {
            body {
                min-width: auto;
            }
        }
        @media (max-width: 1024px) {
            #container {
                width: 95%;
                padding: 15px;
            }
            #map {
                height: 500px;
            }
        }
        @media (max-width: 768px) {
            #container {
                width: 95%;
                padding: 15px;
            }
            #map {
                height: 400px;
            }
            button {
                padding: 12px 20px;
                font-size: 16px;
            }
            .button-container {
                flex-direction: column;
                left: 10px;
                top: 10px;
            }
        }
        @media (max-width: 480px) {
            #map {
                height: 300px;
            }
            button {
                padding: 10px 18px;
                font-size: 14px;
            }
            .button-container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div id="container">
        <h1>Emergency Alert System</h1>
        <div class="button-container">
            <button class="alert-button" onclick="sendAlert()">Send Alert</button>
            <button class="theme-button" onclick="toggleTheme()">Switch Theme</button>
        </div>
        <p id="status">Waiting for location...</p>
        <div id="map"></div>
    </div>
    <script>
        let map;
        let isDarkTheme = false;
        function initMap() {
            map = L.map('map').setView([20.5937, 78.9629], 5);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        }
        function sendAlert() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(position => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    document.getElementById("status").innerText = `Location: ${lat}, ${lon}`;
                    updateMap(lat, lon);
                    sendTelegramAlert(lat, lon);
                }, error => {
                    alert("Error getting location: " + error.message);
                });
            } else {
                alert("Geolocation is not supported by your browser.");
            }
        }
        function updateMap(lat, lon) {
            map.setView([lat, lon], 13);
            L.marker([lat, lon]).addTo(map)
                .bindPopup("Emergency Location").openPopup();
        }
        function sendTelegramAlert(lat, lon) {
            fetch(`/send_alert?lat=${lat}&lon=${lon}`)
                .then(response => response.json())
                .then(data => console.log("Alert sent to Telegram", data))
                .catch(error => console.error("Error sending Telegram alert", error));
        }
        function toggleTheme() {
            document.body.classList.toggle("dark-mode");
            isDarkTheme = !isDarkTheme;
        }
        window.onload = initMap;
    </script>
</body>
</html>
